name: CI

# Phase 0: lint + build only. No AWS deployment steps here yet.
# Deploy automation gets added in a separate deploy.yml during Phase 5.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Lint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build